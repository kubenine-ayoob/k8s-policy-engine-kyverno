apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-configmap-on-ns
spec:
  rules:
  - name: generate-configmap
    match:
      any:
      - resources:
          kinds:
          - Namespace
    generate:
      apiVersion: v1
      kind: ConfigMap
      name: kyverno-generated-cm
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      data:
        data:
          created-by: kyverno
          message: "This ConfigMap was auto-generated"