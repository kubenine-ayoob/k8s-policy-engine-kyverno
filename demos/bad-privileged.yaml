apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged
  namespace: ayoob-kyverno
  labels:
    app.kubernetes.io/name: demo
spec:
  containers:
  - name: nginx
    image: nginx:1.25
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi